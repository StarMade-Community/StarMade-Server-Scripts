services:
  starmade:
    build:
      context: .
      args:
        JAVA_VERSION: ${JAVA_VERSION:-21}
    image: starmade-server
    container_name: ${CONTAINER_NAME:-starmade}
    tty: true
    stdin_open: true
    ports:
      # host port == container port so the mapping is correct in both bridge and
      # host networking. SERVER_PORT also sets the in-container game port (below).
      - "${SERVER_PORT:-4242}:${SERVER_PORT:-4242}/tcp"
      - "${SERVER_PORT:-4242}:${SERVER_PORT:-4242}/udp"
    volumes:
      - ${STARMADE_DIR:-./server-data}:/starmade
    environment:
      - SERVER_PORT=${SERVER_PORT:-4242}
      - JVM_MIN_HEAP=${JVM_MIN_HEAP:-4g}
      - JVM_MAX_HEAP=${JVM_MAX_HEAP:-8g}
      - JVM_EXTRA_ARGS=${JVM_EXTRA_ARGS:-}
    restart: unless-stopped
    # Give the server time to save and shut down gracefully on stop/restart
    stop_grace_period: 30s
